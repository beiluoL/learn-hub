name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 允许 GITHUB_TOKEN 部署到 Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署，避免冲突
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 根目录依赖（turndown 等，用于内容导出 / 生成 manifest）
      - name: Install root dependencies
        run: npm ci

      # 重新扫描 client/public/content，生成 manifest.json（含用户新增内容）
      - name: Regenerate content manifest
        run: npm run gen

      # 前端依赖与构建
      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Build client
        working-directory: client
        # Supabase / Umami 等前端公开配置经 GitHub 仓库密钥注入（.env 被 gitignore 不进仓库）
        # anon key 本就随包下发到浏览器，存为加密 Actions secret 是标准做法
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_UMAMI_ID: ${{ secrets.VITE_UMAMI_ID }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
